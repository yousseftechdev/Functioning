<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Functioning!</title>
    <!-- <link rel="shortcut icon" href="favicon.ico" id="favicon" type="image/x-icon"> -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="top-bar">
        <span id="date"></span>
        <span class="sep">—</span>
        <span>A GAME OF CURVES</span>
        <button id="themeToggle" class="theme-btn">Dark Mode</button>
    </div>


    <div class="game-container">

        <main class="game-container">
            <header class="header">
                <h1 class="title">
                    <span class="title-main">Function</span><span class="title-accent">ing</span><span
                        class="title-dot">.</span>
                </h1>
                <p class="subtitle">Guess the expression that draws the curve. The larger your streak, the more points you get for every right guess!!</p>
            </header>

            <div class="stats-bar">
                <div class="stat">
                    <span class="stat-label">Score</span>
                    <span class="stat-value" id="scoreVal">000</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Streak</span>
                    <span class="stat-value" id="streakVal">00</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Best Score</span>
                    <span class="stat-value" id="bestScoreVal">000</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Best Streak</span>
                    <span class="stat-value" id="bestStreakVal">00</span>
                </div>
            </div>

            <section class="graph-section">
                <div class="graph-label">
                    <span class="label-tag">FIG. 01</span>
                    <span class="label-hint" id="hintText">Loading…</span>
                </div>
                <canvas id="graphCanvas" width="400" height="400"></canvas>
            </section>

            <section class="controls">
                <label class="input-wrapper">
                    <span class="prompt">f(x) =</span>
                    <input type="text" id="userGuess" placeholder="type your expression…" autocomplete="off"
                        spellcheck="false">
                </label>
                <div class="button-row">
                    <button id="submitBtn">Submit -></button>
                    <button id="newGameBtn" class="hidden">New Curve -></button>
                </div>
                <div class="feedback" id="feedback"></div>
            </section>

            <footer class="footer">
                <span>Allowed: x, +, -, *, /, ^, sin, cos, tan, abs, sqrt, e, pi</span>
            </footer>
        </main>

        <script src="js/script.js"></script>
</body>

</html>
